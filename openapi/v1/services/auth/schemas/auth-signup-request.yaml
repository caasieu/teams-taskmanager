type: object
description: Structure of user information used to signup. 

required: 
  - email 
  - password
  - username 
      
properties:
  email:
    type: string
    format: email
    description: The user's email address.

  password:
    type: string 
    format: password
    minLength: 4
    description: The user's password.
  
  username:
    type: string
    minLength: 3
    maxLength: 30
    description: The user's chosen username.


example:
  username: johndoe1 
  email: johndoe1@gmail.com
  password: "mypassword!23"

