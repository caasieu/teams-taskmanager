# admin or internal use (scrum-sprintmanager)
 
get:
  summary: Get user by ID

  operationId: getUserById

  security:
    - bearerAuth: []

  tags:
    - Users

  parameters:

    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:

    "200":
      description: User found

      content:
        application/json:
          schema:
            $ref: "../schemas/user.yaml"

    "404":
      $ref: "../../../components/responses/not-found.yaml"

    "401":
      $ref: "../../../components/responses/unauthorized.yaml"