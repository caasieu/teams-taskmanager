type: object

description: Represents a user in the system.

required:
  - id
  - username
  - email

properties:

  id:
    type: string
    format: uuid

  username:
    type: string
    minLength: 3
    maxLength: 30

  email:
    type: string
    format: email

  createdAt:
    type: string
    format: date-time

  updatedAt:
    type: string
    format: date-time