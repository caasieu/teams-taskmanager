put:
  summary: Assign task

  operationId: assignTask

  security:
    - bearerAuth: []

  tags:
    - Tasks

  parameters:

    - name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  requestBody:
    required: true

    content:
      application/json:
        schema:
          $ref: "../schemas/update-task-assignee-request.yaml"

  responses:

    "200":
      description: Task assigned

      content:
        application/json:
          schema:
            $ref: "../schemas/task.yaml"

    "400":
      $ref: "../../../components/responses/bad-request.yaml"

    "404":
      $ref: "../../../components/responses/not-found.yaml"