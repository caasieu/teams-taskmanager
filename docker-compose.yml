
services:
  web:
    build: .
    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    environment:
      DATABASE_URL: ${DATABASE_URL}
      WATCHPACK_POLLING: "true"
    
    depends_on:
      - postgres

  postgres:
    image: postgres:18

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5434:5432"
    
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
